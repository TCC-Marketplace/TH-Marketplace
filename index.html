<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCC Marketplace — USDT Web3 Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060709;--sur:rgba(20,22,28,0.92);--card:rgba(30,35,45,0.78);--hov:rgba(45,52,65,0.9);
  --gold:#F3BA2F;--gold2:#FFD700;--neon:#FFEA80;--ok:#0ECB81;--err:#F6465D;
  --t1:#EAECEF;--t2:#A0A8B8;--t3:#6B7280;
  --bdr:rgba(243,186,47,0.22);--glass:rgba(255,255,255,0.05);
  --fd:'Syne',sans-serif;--fm:'IBM Plex Mono',monospace;--fb:'Plus Jakarta Sans',sans-serif;
  --r:12px;--rl:20px;
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(circle at 50% 20%, rgba(243,186,47,0.07) 0%, transparent 50%),
                   linear-gradient(180deg,#0A0C0F 0%,#060709 100%);}

/* GLASSMORPHISM + CYBER */
.glass{
  background:linear-gradient(135deg, rgba(30,35,45,0.8), rgba(15,18,25,0.9));
  border:1px solid var(--bdr);
  backdrop-filter:blur(24px);
  border-radius:var(--rl);
  box-shadow:0 8px 32px rgba(0,0,0,0.7), inset 0 0 20px rgba(243,186,47,0.08);
  position:relative;overflow:hidden;
}
.glass::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,234,128,0.06),transparent 60%);
  pointer-events:none;
}
.cyber-border::after{
  content:'';position:absolute;inset:-2px;
  background:linear-gradient(45deg,transparent,var(--gold),transparent);
  border-radius:22px;z-index:-1;filter:blur(12px);opacity:0.4;
  transition:all .4s;
}
.cyber-border:hover::after{opacity:0.85;filter:blur(16px);}

/* NAV — FLOATING QUANTUM */
.nav{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  z-index:1000;background:rgba(11,14,20,0.9);backdrop-filter:blur(20px);
  border:1px solid var(--bdr);border-radius:9999px;padding:10px 28px;
  display:flex;align-items:center;gap:24px;box-shadow:0 12px 50px rgba(0,0,0,0.8);
}
.logo{
  font-family:var(--fd);font-size:24px;font-weight:800;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:pointer;transition:.4s;
}
.logo:hover{transform:scale(1.08) rotate(3deg);}

/* HERO */
.hero{
  padding:180px 20px 100px;position:relative;overflow:hidden;text-align:center;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(243,186,47,0.07) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(243,186,47,0.07) 1px,transparent 1px);
  background-size:70px 70px;animation:gridMove 35s linear infinite;opacity:0.75;
}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:70px 70px}}
.hero::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 30%,rgba(243,186,47,0.18),transparent 70%);
  animation:aurora 22s ease infinite;
}
@keyframes aurora{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}

.hero-badge{
  display:inline-flex;align-items:center;gap:10px;background:rgba(243,186,47,0.12);
  border:1px solid rgba(243,186,47,0.4);color:var(--gold);padding:10px 26px;
  border-radius:9999px;font-weight:600;backdrop-filter:blur(12px);
}
.hero h1{
  font-family:var(--fd);font-size:clamp(3rem,8.5vw,5.4rem);font-weight:800;
  line-height:1.05;margin:1.4rem 0 1rem;
  background:linear-gradient(90deg,#fff,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* PRODUCT CARD — HOLOGRAPHIC */
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;}
.pc{
  background:var(--card);border:1px solid var(--bdr);border-radius:18px;
  overflow:hidden;transition:all .5s cubic-bezier(0.23,1,0.32,1);cursor:pointer;
}
.pc:hover{
  transform:translateY(-16px) scale(1.04);
  box-shadow:0 30px 70px -15px rgba(243,186,47,0.4);
}
.pc-img{
  aspect-ratio:1/1;position:relative;overflow:hidden;background:var(--sur);
}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:0.6s;}
.pc:hover .pc-img img{transform:scale(1.12);}
.pc-img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,234,128,0.7),transparent);
  top:-120%;transition:1.2s;
}
.pc:hover .pc-img::after{top:180%;}
.pc-body{padding:14px 16px;}
.pc-name{font-size:14.5px;font-weight:600;line-height:1.45;margin-bottom:8px;}
.pc-price{font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--gold);}

/* BUTTONS */
.btn-gold,.btn-buy-now{
  background:linear-gradient(135deg,#F3BA2F,#CC9A06)!important;
  color:#0B0E11;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  box-shadow:0 0 25px rgba(243,186,47,0.6);
  transition:all .3s;
}
.btn-gold:hover,.btn-buy-now:hover{
  box-shadow:0 0 45px rgba(243,186,47,0.85);
  transform:translateY(-3px);
}

/* MODALS */
.modal,.modal-xl{
  background:rgba(12,15,22,0.97)!important;
  border:1px solid rgba(243,186,47,0.35)!important;
  backdrop-filter:blur(32px);
  box-shadow:0 0 100px rgba(243,186,47,0.25)!important;
}

/* UTILITY */
.stitle{font-family:var(--fd);font-size:2.1rem;font-weight:800;letter-spacing:-0.04em;}
.stitle span{color:var(--gold);}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav glass cyber-border">
  <div class="logo" onclick="go('home')">TCC<span style="color:var(--t1)">Market</span></div>
  <ul class="nav-links" id="mnav" style="display:flex;list-style:none;gap:20px;">
    <li><a onclick="go('marketplace')" class="active">Marketplace</a></li>
    <li><a onclick="go('dashboard')">Dashboard</a></li>
  </ul>
  <div class="nav-r" style="margin-left:auto;display:flex;align-items:center;gap:12px;">
    <div style="color:var(--gold);font-family:var(--fm);">💰 <span id="nb">1,250.00</span> USDT</div>
    <button class="btn btn-gold btn-sm" onclick="openM('m-login')">Login</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="glass" style="max-width:1200px;margin:0 auto;padding:4rem 2rem;border-radius:28px;">
    <div class="hero-badge">
      <span style="color:var(--ok);animation:pulse 2s infinite;">● LIVE</span>
      🔐 SMART CONTRACT SECURED • TRC20 / BEP20
    </div>
    <h1>ตลาดสินค้าบน<br>Blockchain ยุคใหม่</h1>
    <p style="font-size:1.3rem;max-width:720px;margin:0 auto 2.5rem;color:var(--t2);">
      ซื้อขายด้วย USDT • Funding Free อัตโนมัติ • Referral Commission แบบกระจายศูนย์
    </p>
    <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-gold" onclick="go('marketplace')" style="padding:16px 36px;font-size:1.15rem;">🛒 สำรวจสินค้า</button>
      <button class="btn glass" onclick="go('seller-apply')" style="padding:16px 36px;font-size:1.15rem;">🏪 เปิดร้านเป็น Seller</button>
    </div>
  </div>
</div>

<!-- MARKETPLACE SECTION -->
<div style="max-width:1400px;margin:40px auto;padding:0 2rem;">
  <div class="stitle">สินค้า<span>แนะนำ</span></div>
  <div class="g4" id="h-products"></div>
</div>

<!-- MODALS (ตัวอย่าง) -->
<div class="mover" id="m-login" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;">
  <div class="modal glass" style="width:90%;max-width:480px;padding:2rem;">
    <h2 style="text-align:center;margin-bottom:1.5rem;color:var(--gold);">เข้าสู่ระบบ</h2>
    <button onclick="closeM('m-login');alert('Demo Login สำเร็จ (v6)')" class="btn btn-gold w100">Login with Wallet</button>
  </div>
</div>

<script>
// === DEMO DATA ===
const D = {
  products: [
    {id:'P001',name:'MacBook Pro M3 14"',price:3299,seller:'TechVault',rating:4.9,ff:true},
    {id:'P002',name:'iPhone 16 Pro Max',price:1499,seller:'NeoStore',rating:5.0,ff:true},
    {id:'P003',name:'Sony WH-1000XM5',price:349,seller:'AudioForge',rating:4.8,ff:true},
  ]
};

// Simple routing
function go(page){ 
  console.log(`🚀 Navigating to: ${page} (v6 Futuristic)`);
  if(page==='marketplace') document.getElementById('h-products').scrollIntoView({behavior:'smooth'});
}

// Render products
function renderHomeProducts(){
  const container = document.getElementById('h-products');
  container.innerHTML = D.products.map(p => `
    <div class="pc glass cyber-border" onclick="alert('Opened ${p.name} — Product Detail v6')">
      <div class="pc-img"><div style="width:100%;height:100%;background:linear-gradient(#1a1f2e,#2a2f3f);display:flex;align-items:center;justify-content:center;font-size:4rem;">${p.id==='P001'?'💻':p.id==='P002'?'📱':'🎧'}</div></div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-price">${p.price.toLocaleString()} USDT</div>
        <div style="margin-top:8px;font-size:12px;color:var(--t2);">${p.seller}</div>
        ${p.ff?'<div style="margin-top:8px;color:var(--gold);font-size:13px;">✨ Funding Free</div>':''}
      </div>
    </div>
  `).join('');
}

// Pulse animation
const style = document.createElement('style');
style.innerHTML = `@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`;
document.head.appendChild(style);

// Init
window.onload = () => {
  renderHomeProducts();
  console.log('%cTCC Marketplace v6 — Futuristic Web3 Edition Loaded Successfully', 'color:#F3BA2F;font-size:16px;font-weight:bold;');
};
</script>
</body>
</html>
